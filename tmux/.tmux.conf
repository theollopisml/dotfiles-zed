# ─── Prefix : Ctrl+A (plus accessible que Ctrl+B) ────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Splits : Ctrl+A puis | ou - ─────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Navigation entre panes : Alt+fleches (sans prefix) ──
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ─── Redimensionner panes : Ctrl+Shift+fleches ───────────
bind -n C-S-Left resize-pane -L 2
bind -n C-S-Right resize-pane -R 2
bind -n C-S-Up resize-pane -U 2
bind -n C-S-Down resize-pane -D 2

# ─── Nouveau window : Ctrl+A puis c ──────────────────────
bind c new-window -c "#{pane_current_path}"

# ─── Switch windows : Shift+fleches (sans prefix) ────────
bind -n S-Left previous-window
bind -n S-Right next-window

# ─── Mouse support ───────────────────────────────────────
set -g mouse on

# ─── Terminal 256 couleurs ───────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ─── Pas de delai sur Escape (important pour vim/zed) ────
set -sg escape-time 0

# ─── Historique genereux ─────────────────────────────────
set -g history-limit 50000

# ─── Index des windows commence a 1 (pas 0) ─────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Barre de statut minimale ────────────────────────────
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-right "#[fg=white]%H:%M "
set -g status-left-length 20
setw -g window-status-current-style "fg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ─── Reload config : Ctrl+A puis r ──────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─── Fermer pane : Ctrl+A puis x ────────────────────────
# (deja par defaut, confirme avec y/n)

# ─── Copie style vi (optionnel, pratique pour scroll) ────
setw -g mode-keys vi
